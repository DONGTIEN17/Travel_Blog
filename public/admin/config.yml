backend:
  name: github
  repo: DONGTIEN17/Travel_Blog
  branch: main
  base_url: https://github.com
  auth_endpoint: login/oauth/authorize
  app_id: Ov23likaHPxau3lpMHvw

# (Giữ nguyên các cấu hình khác ở bên dưới)

# Nơi lưu trữ ảnh khi bạn upload trên trang admin
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Bài viết Du lịch"
    folder: "src/content/blog" # Phải khớp với thư mục blog của template Astro
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Mô tả", name: "description", widget: "string" }
      - { label: "Ngày đăng", name: "pubDate", widget: "datetime" }
      - { label: "Ảnh bìa", name: "heroImage", widget: "image", required: false }
      - { label: "Nội dung bài viết", name: "body", widget: "markdown" }